<!DOCTYPE html>
<html>
<head>
  <title>NimbleAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>NimbleAI</h2>
      <ul>
        <li onclick="showPage('overview')" class="active">Overview</li>
        <li onclick="showPage('email')">Email Summarizer</li>
        <li onclick="showPage('task')">Task Generator</li>
        <li onclick="showPage('reply')">Auto Reply</li>
        <li onclick="showPage('file')">File Analyzer</li>
    
      </ul>
    </div>

    <!-- Main -->
    <div class="main">

  <div id="overview" class="page">
    <h1>Overview</h1>
    <p>Welcome to NimbleAI 🚀</p>
  </div>

  <div id="email" class="page">
    <h1>Email Summarizer</h1>

    <div class="card">
      <textarea placeholder="Paste your email here..."></textarea>
      <button onclick="generateSummary()">Generate Summary</button>
    </div>

    <div class="output"></div>
  </div>

  <div id="task" class="page" style="display:none;">
  <h1>Task Generator</h1>

  <div class="task-container">
    <div class="card">
      <textarea placeholder="Describe your task..."></textarea>
      <button>Generate Tasks</button>
    </div>

    <div class="card">
      <h3>Generated Tasks</h3>
      <ul></ul>
    </div>
  </div>
</div>
  

  <div id="reply" class="page" style="display:none;">
  <h1>Auto Reply</h1>

  <div class="card">
    <textarea placeholder="Paste message here..."></textarea>
    <button>Generate Reply</button>
  </div>

  <div class="card">
    <h3>Reply</h3>
    <div class="output"></div>
  </div>
</div>
      

  <div id="file" class="page" style="display:none;">
  <h1>File Analyzer</h1>

  <div class="card">
    <input type="file" />
    <button>Analyze File</button>
  </div>

  <div class="card">
    <h3>Result</h3>
    <div class="output"></div>
  </div>
</div>

</div>

  <script src="script.js"></script>
</body>
